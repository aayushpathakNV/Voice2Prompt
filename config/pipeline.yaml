stage1:
  model: parakeet-tdt-0.6b-v2
  device: auto

stage2:
  model: Phi-3.5-mini-instruct-Q4_K_M.gguf
  n_gpu_layers: -1
  max_tokens: 512
  temperature: 0.0
  context_size: 2048

stage3:
  model: microsoft/llmlingua-2-bert-large-multilingual-cased-meetingbank
  rate: 0.4
  force_tokens: ["##", "-", "**"]

emit:
  format: openai
  base_url: https://api.openai.com/v1
  attach_metadata: true
