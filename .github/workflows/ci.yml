name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # ML runtime deps (llama-cpp-python, llmlingua, sounddevice) are in the
      # [ml] optional group and are NOT installed in CI — all model calls are
      # mocked in tests. Only the lightweight base + dev deps are needed.
      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Lint
        run: ruff check voice2prompt/ tests/

      - name: Type check
        run: mypy voice2prompt/ --ignore-missing-imports
